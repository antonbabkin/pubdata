## 2022 revision processed
  2022_met:
    mask: "{revision}_met"
    desc: BDS by metro/non-metro, {revision} revision
    type: table
    path: "proc/{revision}/bds{revision}_met.pq"
    depends: raw_{revision}_met
    schema:
      <<: [*schema_year, *schema_met, *schema_core]

  2022_st_cty:
    mask: "{revision}_st_cty"
    desc: BDS by county, {revision} revision
    type: table
    path: "proc/{revision}/bds{revision}_st_cty.pq"
